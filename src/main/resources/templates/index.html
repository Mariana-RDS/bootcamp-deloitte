<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TaskMaster </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .kanban-col {
            min-height: 70vh;
        }
    </style>
</head>

<body class="bg-light">


    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">TaskMaster</h2>
            <button type="button" class="btn btn-primary shadow-sm" data-bs-toggle="modal"
                data-bs-target="#modalNovaTarefa">+ Nova Tarefa</button>
        </div>

        <div class="row">

            <div class="col kanban-col shadow-sm p-3 mb-5 bg-white rounded mx-2 border-top border-4 border-black">
                <h3 class="mb-4">Pendentes</h3>

                <div th:each="t : ${tarefas}" th:if="${t.status.name() == 'PENDENTE'}" class="card mb-3 shadow-sm border-start border border-2">
                    <div class="card-body text-start">
                        <h6 class="card-title fw-bold text-dark mb-1" th:text="${t.titulo()}">Título</h6>
                        <p class="card-text text-muted small mb-3" th:text="${t.categoria}">Categoria</p>

                        <div class="d-flex justify-content-start gap-2 pt-2 border-top">

                            <button class="btn btn-sm btn-outline-secondary p-1 px-2" title="Editar"
                                data-bs-toggle="modal" th:data-bs-target="'#modalEditar' + ${t.id()}">Editar
                                <i class="bi bi-pencil-square"></i>
                            </button>

                            <form th:action="@{/tarefas/excluir/{id}(id=${t.id()})}" th:method="delete" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger p-1 px-2"
                                    onclick="return confirm('Excluir esta tarefa?')" title="Excluir">Excluir
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>

                            <form th:if="${t.status.name() == 'PENDENTE'}" th:action="@{/tarefas/status/{id}(id=${t.id()})}" method="POST" class="d-inline">
                                <input type="hidden" name="novoStatus" value="ANDAMENTO">
                                <button type="submit" class="btn btn-sm btn-primary py-1 px-2">
                                    Começar ➜<i class="bi bi-play-fill"></i>
                                </button>
                            </form>



                            <div class="modal fade" th:id="'modalEditar' + ${t.id()}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Editar Tarefa</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <form th:action="@{/tarefas/editar/{id}(id=${t.id()})}" th:method="put">
                                            <div class="modal-body text-start">
                                                <div class="mb-3">
                                                    <label class="form-label">Título</label>
                                                    <input type="text" class="form-control" name="titulo" th:value="${t.titulo()}" required>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Categoria</label>
                                                    <select class="form-select" name="categoria">
                                                        <option value="TRABALHO" th:selected="${t.categoria.name() == 'TRABALHO'}">Trabalho
                                                        </option>
                                                        <option value="ESTUDOS" th:selected="${t.categoria.name() == 'ESTUDOS'}">Estudos
                                                        </option>
                                                        <option value="LAZER" th:selected="${t.categoria.name() == 'LAZER'}">Lazer</option>
                                                        <option value="PESSOAL" th:selected="${t.categoria.name() == 'PESSOAL'}">Pessoal
                                                        </option>
                                                    </select>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Status</label>
                                                    <select class="form-select" name="status">
                                                        <option value="PENDENTE" th:selected="${t.status.name() == 'PENDENTE'}">Pendente
                                                        </option>
                                                        <option value="ANDAMENTO" th:selected="${t.status.name() == 'ANDAMENTO'}">Em Andamento
                                                        </option>
                                                        <option value="CONCLUIDA" th:selected="${t.status.name() == 'CONCLUIDA'}">Concluída
                                                        </option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>




            <div class="col kanban-col shadow-sm p-3 mb-5 bg-white rounded mx-2 border-top border-4 border-black">
                <h3 class="mb-4">Em Andamento</h3>

                <div th:each="t : ${tarefas}" th:if="${t.status.name() == 'ANDAMENTO'}"
                    class="card mb-3 shadow-sm border-start border border-2">
                    <div class="card-body">
                        <h6 class="card-title text-dark" th:text="${t.titulo()}">Título</h6>
                        <p class="card-text text-muted mb-2" th:text="${t.categoria}">Categoria</p>

                        <div class="d-flex justify-content-start gap-2 pt-2 border-top">

                            <button class="btn btn-sm btn-outline-secondary p-1 px-2" title="Editar"
                                data-bs-toggle="modal" th:data-bs-target="'#modalEditar' + ${t.id()}">Editar
                                <i class="bi bi-pencil-square"></i>
                            </button>

                            <form th:action="@{/tarefas/excluir/{id}(id=${t.id()})}" th:method="delete" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-danger p-1 px-2"
                                    onclick="return confirm('Excluir esta tarefa?')" title="Excluir">Excluir
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>

                            <form th:if="${t.status.name() == 'ANDAMENTO'}"
                                th:action="@{/tarefas/status/{id}(id=${t.id()})}" method="POST" class="d-inline">
                                <input type="hidden" name="novoStatus" value="CONCLUIDA">
                                <button type="submit" class="btn btn-outline-success py-1 px-2">
                                    Concluir ✓<i class="bi bi-play-fill"></i>
                                </button>
                            </form>




                            <div class="modal fade" th:id="'modalEditar' + ${t.id()}" tabindex="-1" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Editar Tarefa</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <form th:action="@{/tarefas/editar/{id}(id=${t.id()})}" th:method="put">
                                            <div class="modal-body text-start">
                                                <div class="mb-3">
                                                    <label class="form-label">Título</label>
                                                    <input type="text" class="form-control" name="titulo" th:value="${t.titulo()}" required>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Categoria</label>
                                                    <select class="form-select" name="categoria">
                                                        <option value="TRABALHO" th:selected="${t.categoria.name() == 'TRABALHO'}">Trabalho
                                                        </option>
                                                        <option value="ESTUDOS" th:selected="${t.categoria.name() == 'ESTUDOS'}">Estudos
                                                        </option>
                                                        <option value="LAZER" th:selected="${t.categoria.name() == 'LAZER'}">Lazer</option>
                                                        <option value="PESSOAL" th:selected="${t.categoria.name() == 'PESSOAL'}">Pessoal
                                                        </option>
                                                    </select>
                                                </div>

                                                <div class="mb-3">
                                                    <label class="form-label">Status</label>
                                                    <select class="form-select" name="status">
                                                        <option value="PENDENTE" th:selected="${t.status.name() == 'PENDENTE'}">Pendente
                                                        </option>
                                                        <option value="ANDAMENTO" th:selected="${t.status.name() == 'ANDAMENTO'}">Em Andamento
                                                        </option>
                                                        <option value="CONCLUIDA" th:selected="${t.status.name() == 'CONCLUIDA'}">Concluída
                                                        </option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="modal-footer">
                                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>





            <div class="col kanban-col shadow-sm p-3 mb-5 bg-white rounded mx-2 border-top border-4 border-black">
                <h3 class="mb-4">Concluídas</h3>

                <div th:each="t : ${tarefas}" th:if="${t.status.name() == 'CONCLUIDA'}"
                    class="card mb-3 shadow-sm border-start border border-2">
                    <div class="card-body">
                        <h6 class="card-title text-muted text-decoration-line-through" th:text="${t.titulo()}">Título</h6>
                    </div>
                </div>
            </div>

        </div>

    </div>





    <div class="modal fade" id="modalNovaTarefa" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">Cadastrar Nova Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form th:action="@{/tarefas/salvar}" method="POST">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="titulo" class="form-label">Título da Tarefa</label>
                            <input type="text" class="form-control" id="titulo" name="titulo"
                                placeholder="Ex: Estudar POO" required>
                        </div>

                        <div class="mb-3">
                            <label for="categoria" class="form-label">Categoria</label>
                            <select class="form-select" id="categoria" name="categoria" required>
                                <option value="TRABALHO">Trabalho</option>
                                <option value="ESTUDOS">Estudos</option>
                                <option value="LAZER">Lazer</option>
                                <option value="PESSOAL">Pessoal</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="status" class="form-label">Status Inicial</label>
                            <select class="form-select" id="status" name="status" required>
                                <option value="PENDENTE">Pendente</option>
                                <option value="ANDAMENTO">Em Andamento</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-success">Salvar Tarefa</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
